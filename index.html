<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryTV // Neon Universe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #06060c;
            --panel-bg: rgba(15, 15, 25, 0.7);
            --neon-cyan: #00f2fe;
            --neon-magenta: #fe019a;
            --neon-amber: #ffaa00;
            --text-main: #ffffff;
            --text-muted: #8a8ab0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background-color: var(--bg-color); color: var(--text-main);
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
            background: radial-gradient(circle at 50% 90%, rgba(0, 242, 254, 0.05) 0%, transparent 50%);
        }
        .app-window {
            width: 100%; max-width: 420px; height: 92vh; max-height: 850px; background: var(--panel-bg);
            border-radius: 32px; border: 1px solid rgba(255, 255, 255, 0.08); overflow: hidden; position: relative;
            backdrop-filter: blur(25px); display: flex; flex-direction: column;
        }
        header { padding: 24px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 1.4rem; letter-spacing: 1.5px; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .content-feed { flex-grow: 1; padding: 15px 20px; overflow-y: auto; margin-bottom: 60px; }
        .content-feed::-webkit-scrollbar { display: none; }
        
        .section-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin: 20px 0 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        
        /* Circular Row Custom Layout styling */
        .stories-row { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 10px; }
        .stories-row::-webkit-scrollbar { display: none; }
        .story-widget { display: flex; flex-direction: column; align-items: center; cursor: pointer; flex-shrink: 0; }
        .thumbnail-ring { width: 72px; height: 72px; border-radius: 50%; padding: 3px; background: linear-gradient(45deg, var(--neon-cyan), var(--neon-magenta)); }
        .thumbnail-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #0d0d13; }
        .story-name { font-size: 0.7rem; color: var(--text-main); margin-top: 6px; max-width: 75px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Movie Folder Categorization Panels */
        .movie-showcase-container { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 14px; margin-bottom: 16px; }
        .showcase-header { font-size: 0.85rem; font-weight: 800; color: #fff; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 0.5px;}
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .preview-card { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 14px; padding: 6px; cursor: pointer; position: relative; }
        .preview-thumb { width: 100%; height: 115px; border-radius: 10px; object-fit: cover; margin-bottom: 6px; }
        .preview-title { font-size: 0.7rem; font-weight: 600; color: #d1d1e0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-likes { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 6px; font-size: 0.6rem; color: var(--neon-cyan); display: flex; align-items: center; gap: 3px; }

        /* Navigation Footer Anchors */
        .bottom-nav-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 64px; background: rgba(10, 10, 20, 0.9); border-top: 1px solid rgba(255, 255, 255, 0.08); display: flex; justify-content: space-between; align-items: center; padding: 0 35px; backdrop-filter: blur(10px); z-index: 10; }
        .nav-anchor { color: var(--text-muted); font-size: 1.2rem; cursor: pointer; background: none; border: none; }
        .nav-anchor.active { color: var(--neon-magenta); }

        /* MODAL SCREEN OVERLAYS */
        .video-player-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: none; }
        .video-player-modal.active { display: block; }
        .close-modal { position: absolute; top: 24px; left: 20px; z-index: 110; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .full-video { width: 100%; height: 100%; object-fit: cover; }
        .sidebar-controls { position: absolute; right: 16px; bottom: 120px; display: flex; flex-direction: column; gap: 16px; align-items: center; z-index: 102; }
        .btn-action { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); width: 44px; height: 44px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #fff; cursor: pointer; }
        .btn-action.liked { color: var(--neon-magenta) !important; border-color: var(--neon-magenta) !important; box-shadow: 0 0 10px var(--neon-magenta); }
        .sidebar-controls span { font-size: 0.65rem; color: var(--text-muted); margin-top: -12px; font-weight: 600; }
        .overlay-meta { position: absolute; bottom: 30px; left: 20px; right: 80px; z-index: 102; pointer-events: none;}
        .channel-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .channel-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--neon-cyan); }
    </style>
</head>
<body>

    <div class="app-window">
        <header>
            <h1 class="logo">StoryTV</h1>
            <span style="font-size:0.65rem; background:rgba(0,242,254,0.1); border:1px solid var(--neon-cyan); color:var(--neon-cyan); padding:2px 8px; border-radius:8px;"><i class="fa-solid fa-satellite-dish"></i> SYNCED</span>
        </header>

        <main class="content-feed">
            <div class="stories-row" id="appStoriesRow"></div>
            
            <div class="section-title"><i class="fa-solid fa-clapperboard" style="color:var(--neon-magenta)"></i> Cinema Collections</div>
            <div id="moviesShowcaseArea"></div>
        </main>

        <nav class="bottom-nav-bar">
            <button class="nav-anchor" onclick="alert('User Gateway Terminal Online')"><i class="fa-solid fa-user-astronaut"></i></button>
            <button class="nav-anchor active"><i class="fa-solid fa-house"></i></button>
            <button class="nav-anchor" onclick="alert('Bookmark Indexes Managed Here')"><i class="fa-solid fa-star"></i></button>
        </nav>

        <!-- FLOATING VIDEO PLAYBACK OVERLAY -->
        <div id="videoModal" class="video-player-modal">
            <button class="close-modal" onclick="closeReel()"><i class="fa-solid fa-xmark"></i></button>
            <video id="modalVideo" class="full-video" loop playsinline></video>
            <div class="sidebar-controls">
                <button id="likeBtn" class="btn-action" onclick="toggleLike()"><i class="fa-solid fa-heart"></i></button>
                <span id="likeCount">0</span>
            </div>
            <div class="overlay-meta">
                <div class="channel-row">
                    <img id="modalAvatar" src="" class="channel-avatar">
                    <span id="modalUser" style="font-weight:600; font-size:0.85rem;"></span>
                </div>
                <p id="modalDesc" style="font-size:0.75rem; color:#d1d1e0;"></p>
            </div>
        </div>
    </div>

    <script>
        let lastKnownSignature = null;
        let masterFlatDataset = [];
        let openReelId = null;

        window.onload = function() {
            syncAndRenderData();
            // Silently check for background modifications every 2 seconds without interrupting user focus
            setInterval(checkForSilentUpdates, 2000);
        };

        function syncAndRenderData() {
            const database = JSON.parse(localStorage.getItem('storytv_movies_db')) || {};
            const likesRegistry = JSON.parse(localStorage.getItem('storytv_likes_map')) || {};
            lastKnownSignature = localStorage.getItem('db_generation_signature') || 'base';

            masterFlatDataset = [];
            const storiesRow = document.getElementById('appStoriesRow');
            const showcaseArea = document.getElementById('moviesShowcaseArea');
            
            storiesRow.innerHTML = '';
            showcaseArea.innerHTML = '';

            const movieKeys = Object.keys(database);
            if(movieKeys.length === 0) {
                showcaseArea.innerHTML = `<div style="text-align:center; font-size:0.75rem; color:var(--text-muted); padding:30px;">Waiting for network broadcasts...</div>`;
                return;
            }

            movieKeys.forEach(movieKey => {
                const folderWrapper = document.createElement('div');
                folderWrapper.className = 'movie-showcase-container';
                folderWrapper.innerHTML = `<div class="showcase-header"><i class="fa-solid fa-film" style="color:var(--neon-cyan)"></i> ${movieKey}</div>`;
                
                const grid = document.createElement('div');
                grid.className = 'grid-container';

                database[movieKey].forEach(video => {
                    // Inject real-time interactive counts
                    if(likesRegistry[video.id] !== undefined) video.likesCount = likesRegistry[video.id];
                    masterFlatDataset.push(video);

                    // Render circular profile story node entry
                    const widget = document.createElement('div');
                    widget.className = 'story-widget';
                    widget.onclick = () => openReelWindow(video.id);
                    widget.innerHTML = `
                        <div class="thumbnail-ring"><img src="${video.coverImg}" class="thumbnail-img"></div>
                        <span class="story-name">${video.username}</span>
                    `;
                    storiesRow.appendChild(widget);

                    // Render grid card entry inside specific folder block
                    const card = document.createElement('div');
                    card.className = 'preview-card';
                    card.onclick = () => openReelWindow(video.id);
                    card.innerHTML = `
                        <div class="card-likes"><i class="fa-solid fa-heart"></i> ${video.likesCount}</div>
                        <img src="${video.coverImg}" class="preview-thumb">
                        <p class="preview-title">${video.description}</p>
                    `;
                    grid.appendChild(card);
                });

                folderWrapper.appendChild(grid);
                showcaseArea.appendChild(folderWrapper);
            });

            // Resync open video instances silently if applicable
            if(openReelId) {
                const refreshedReel = masterFlatDataset.find(v => v.id === openReelId);
                if(refreshedReel) {
                    document.getElementById('likeCount').innerText = refreshedReel.likesCount;
                } else {
                    closeReel(); // Force drop out if current asset was purged by creator
                }
            }
        }

        function checkForSilentUpdates() {
            const externalSignature = localStorage.getItem('db_generation_signature');
            if(externalSignature !== lastKnownSignature) {
                syncAndRenderData(); // Execute zero-latency refresh loop configuration elements
            }
        }

        function openReelWindow(id) {
            openReelId = id;
            const target = masterFlatDataset.find(v => v.id === id);
            if(!target) return;

            const video = document.getElementById('modalVideo');
            video.src = target.videoSrc;
            document.getElementById('modalUser').innerText = target.username;
            document.getElementById('modalAvatar').src = target.avatarSrc;
            document.getElementById('modalDesc').innerText = target.description;
            document.getElementById('likeCount').innerText = target.likesCount;

            const likedMap = JSON.parse(localStorage.getItem('user_liked_sessions')) || {};
            document.getElementById('likeBtn').classList.toggle('liked', !!likedMap[id]);

            document.getElementById('videoModal').classList.add('active');
            video.play().catch(() => {});
        }

        function toggleLike() {
            if(!openReelId) return;
            const likedMap = JSON.parse(localStorage.getItem('user_liked_sessions')) || {};
            const likesRegistry = JSON.parse(localStorage.getItem('storytv_likes_map')) || {};
            const target = masterFlatDataset.find(v => v.id === openReelId);
            if(!target) return;

            if(likedMap[openReelId]) {
                delete likedMap[openReelId];
                target.likesCount = Math.max(0, target.likesCount - 1);
            } else {
                likedMap[openReelId] = true;
                target.likesCount += 1;
            }

            likesRegistry[openReelId] = target.likesCount;
            localStorage.setItem('storytv_likes_map', JSON.stringify(likesRegistry));
            localStorage.setItem('user_liked_sessions', JSON.stringify(likedMap));
            
            document.getElementById('likeCount').innerText = target.likesCount;
            document.getElementById('likeBtn').classList.toggle('liked', !!likedMap[openReelId]);
            
            // Increment tracking configuration elements
            localStorage.setItem('db_generation_signature', Date.now());
            syncAndRenderData();
        }

        function closeReel() {
            document.getElementById('modalVideo').pause();
            document.getElementById('videoModal').classList.remove('active');
            openReelId = null;
        }
    </script>
</body>
</html>
