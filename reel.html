<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryTV // Neon Reels</title>
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #06060c;
            --panel-bg: rgba(15, 15, 25, 0.7);
            --neon-cyan: #00f2fe;
            --neon-magenta: #fe019a;
            --neon-amber: #ffaa00;
            --text-main: #ffffff;
            --text-muted: #8a8ab0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at 50% 10%, rgba(0, 242, 254, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 50% 90%, rgba(254, 1, 154, 0.05) 0%, transparent 50%);
        }

        .app-window {
            width: 100%;
            max-width: 420px;
            height: 92vh;
            max-height: 850px;
            background: var(--panel-bg);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 242, 254, 0.05);
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(25px);
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 24px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 800;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        .live-tag {
            background: rgba(0, 242, 254, 0.1);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 800;
            text-shadow: 0 0 5px var(--neon-cyan);
        }

        .content-feed { flex-grow: 1; padding: 15px 20px; overflow-y: auto; }
        .content-feed::-webkit-scrollbar { display: none; }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stories-row { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .stories-row::-webkit-scrollbar { display: none; }

        .story-widget { display: flex; flex-direction: column; align-items: center; cursor: pointer; flex-shrink: 0; transition: transform 0.2s ease; }
        .story-widget:hover { transform: scale(1.05); }

        .thumbnail-ring {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-magenta));
            box-shadow: 0 0 12px rgba(0, 242, 254, 0.3);
            margin-bottom: 8px;
        }

        .thumbnail-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #0d0d13; }
        .story-name { font-size: 0.75rem; font-weight: 600; color: var(--text-main); max-width: 80px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; margin-bottom: 20px; }
        .preview-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 8px; cursor: pointer; transition: transform 0.2s; }
        .preview-card:hover { transform: translateY(-2px); }
        .preview-thumb { width: 100%; height: 140px; border-radius: 12px; object-fit: cover; margin-bottom: 8px; }
        .preview-title { font-size: 0.75rem; font-weight: 600; color: #d1d1e0; }

        #emptyFavorites { grid-column: span 2; text-align: center; color: var(--text-muted); font-size: 0.8rem; padding: 20px; border: 1px dashed rgba(255,255,255,0.1); border-radius: 16px; }

        /* REEL PLAY VIEW OVERLAY MODAL */
        .video-player-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: none; opacity: 0; transition: opacity 0.3s ease; }
        .video-player-modal.active { display: block; opacity: 1; }
        .close-modal { position: absolute; top: 24px; left: 20px; z-index: 110; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); color: white; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(5px); }
        .full-video { width: 100%; height: 100%; object-fit: cover; }
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, rgba(6, 6, 12, 0.95) 0%, transparent 45%, rgba(0,0,0,0.4) 100%); pointer-events: none; z-index: 101; }

        .sidebar-controls { position: absolute; right: 16px; bottom: 120px; display: flex; flex-direction: column; gap: 16px; align-items: center; z-index: 102; }
        .btn-action { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); width: 46px; height: 46px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #fff; font-size: 1.1rem; cursor: pointer; transition: all 0.2s ease; }
        .btn-action.liked { color: var(--neon-magenta) !important; border-color: var(--neon-magenta) !important; box-shadow: 0 0 15px var(--neon-magenta); }
        .btn-action.favorited { color: var(--neon-amber) !important; border-color: var(--neon-amber) !important; box-shadow: 0 0 15px var(--neon-amber); }
        .sidebar-controls span { font-size: 0.7rem; color: var(--text-muted); margin-top: -12px; font-weight: 600; }

        .overlay-meta { position: absolute; bottom: 30px; left: 20px; right: 80px; z-index: 102; }
        .channel-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .channel-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--neon-cyan); }
        .channel-name { font-weight: 600; font-size: 0.9rem; }
        .meta-desc { font-size: 0.8rem; color: #d1d1e0; margin-bottom: 12px; }

        .scrub-container { width: 100%; display: flex; align-items: center; gap: 10px; background: rgba(255, 255, 255, 0.06); padding: 8px 14px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .scrub-track { flex-grow: 1; height: 4px; background: rgba(255, 255, 255, 0.15); position: relative; }
        .scrub-progress { position: absolute; left: 0; top: 0; height: 100%; width: 40%; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta)); box-shadow: 0 0 10px var(--neon-cyan); }
        .scrub-time { font-size: 0.7rem; font-family: monospace; color: var(--neon-cyan); }

        /* LIVE COMMENTS DRAWERS INTERACTIVE SUBSYSTEM */
        .comments-drawer { position: absolute; bottom: 0; left: 0; width: 100%; height: 50%; background: #090911; border-top: 1px solid rgba(255,255,255,0.1); border-radius: 24px 24px 0 0; z-index: 120; transform: translateY(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; padding: 16px; box-shadow: 0 -10px 30px rgba(0,0,0,0.8); }
        .comments-drawer.open { transform: translateY(0); }
        .comments-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .comments-list { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
        .comments-list::-webkit-scrollbar { display: none; }
        .comment-item { font-size: 0.8rem; line-height: 1.4; background: rgba(255,255,255,0.03); padding: 8px 12px; border-radius: 12px; }
        .comment-user { color: var(--neon-cyan); font-weight: 600; margin-right: 6px; }
        .comment-input-area { display: flex; gap: 8px; }
        .comment-input { flex-grow: 1; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 8px 16px; color: #fff; font-size: 0.85rem; outline: none; }
        .comment-submit { background: var(--neon-magenta); border: none; width: 36px; height: 36px; border-radius: 50%; color: #fff; cursor: pointer; box-shadow: 0 0 10px var(--neon-magenta); }
    </style>
</head>
<body>

    <div class="app-window">
        <header class="header">
            <h1 class="logo">StoryTV</h1>
            <span class="live-tag"><i class="fa-solid fa-bolt"></i> 15M REELS</span>
        </header>

        <main class="content-feed">
            <!-- Continuous Stream Injection Channel Wrapper Container -->
            <div class="stories-row" id="appStoriesRow">
                <!-- Structural base placeholders -->
                <div class="story-widget" onclick="openReel(101, 'https://assets.mixkit.co/videos/preview/mixkit-neon-light-from-a-tunnel-41865-large.mp4', 'cyber_core', 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150', 'Cyberpunk Tokyo production session. Episode 4.', '12.4K', 'https://images.unsplash.com/photo-1509198397868-475647b2a1e5?w=300')">
                    <div class="thumbnail-ring"><img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150" class="thumbnail-img"></div>
                    <span class="story-name">cyber_core</span>
                </div>
                <div class="story-widget" onclick="openReel(102, 'https://assets.mixkit.co/videos/preview/mixkit-tunnel-of-futuristic-blue-lights-41864-large.mp4', 'synth_vibe', 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150', 'Building darkwave baselines live on hardware synths.', '8.9K', 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=300')">
                    <div class="thumbnail-ring" style="background: linear-gradient(45deg, var(--neon-magenta), #7928ca)"><img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150" class="thumbnail-img"></div>
                    <span class="story-name">synth_vibe</span>
                </div>
            </div>

            <!-- Dynamic Personal Bookmarks Section -->
            <h3 class="section-title" style="color: var(--neon-amber)"><i class="fa-solid fa-star"></i> My Favorites</h3>
            <div class="grid-container" id="favoritesGrid">
                <div id="emptyFavorites">No bookmarked reels yet. Open a story to add favorites!</div>
            </div>

            <h3 class="section-title">Trending Shows</h3>
            <div class="grid-container" id="trendingGrid">
                <div class="preview-card" onclick="openReel(101, 'https://assets.mixkit.co/videos/preview/mixkit-neon-light-from-a-tunnel-41865-large.mp4', 'cyber_core', 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150', 'Cyberpunk Tokyo production session. Episode 4.', '12.4K', 'https://images.unsplash.com/photo-1509198397868-475647b2a1e5?w=300')">
                    <img src="https://images.unsplash.com/photo-1509198397868-475647b2a1e5?w=300" class="preview-thumb">
                    <p class="preview-title">Tokyo Grid Lights // 15 Min Exclusive</p>
                </div>
            </div>
        </main>

        <!-- VIDEO PLAYER OVERLAY VIEW MODAL -->
        <div id="videoModal" class="video-player-modal">
            <button class="close-modal" onclick="closeReel()"><i class="fa-solid fa-xmark"></i></button>
            <video id="modalVideo" class="full-video" loop playsinline></video>
            <div class="modal-overlay"></div>

            <div class="sidebar-controls">
                <button id="likeBtn" class="btn-action" onclick="toggleLike()"><i class="fa-solid fa-heart"></i></button>
                <span id="likeCount">0</span>
                <button id="favBtn" class="btn-action" onclick="toggleFavorite()"><i class="fa-solid fa-star"></i></button>
                <span>Save</span>
                <button class="btn-action" onclick="toggleComments(true)"><i class="fa-solid fa-comment"></i></button>
                <span>Chat</span>
                <button class="btn-action" onclick="triggerNativeShare()"><i class="fa-solid fa-paper-plane"></i></button>
                <span>Share</span>
            </div>

            <div class="overlay-meta">
                <div class="channel-row">
                    <img id="modalAvatar" src="" class="channel-avatar">
                    <span id="modalUser" class="channel-name"></span>
                </div>
                <p id="modalDesc" class="meta-desc"></p>
                <div class="scrub-container">
                    <i class="fa-solid fa-play" style="font-size: 0.7rem; color: var(--neon-cyan)"></i>
                    <div class="scrub-track"><div class="scrub-progress"></div></div>
                    <span class="scrub-time">00:00 / 15:00</span>
                </div>
            </div>

            <div id="commentsDrawer" class="comments-drawer">
                <div class="comments-header">
                    <h4>Live Interaction Panel</h4>
                    <button class="btn-action" style="width:28px; height:28px; font-size:0.8rem;" onclick="toggleComments(false)"><i class="fa-solid fa-chevron-down"></i></button>
                </div>
                <div id="commentsList" class="comments-list">
                    <div class="comment-item"><span class="comment-user">alex_neon</span>Insane track choice! Full version dropping when?</div>
                </div>
                <div class="comment-input-area">
                    <input type="text" id="commentInput" class="comment-input" placeholder="Type a public message...">
                    <button class="comment-submit" onclick="postComment()"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('videoModal');
        const video = document.getElementById('modalVideo');
        const likeBtn = document.getElementById('likeBtn');
        const favBtn = document.getElementById('favBtn');
        const likeCountText = document.getElementById('likeCount');
        const favoritesGrid = document.getElementById('favoritesGrid');
        const storiesRow = document.getElementById('appStoriesRow');

        let currentReelData = {};
        let favoriteReels = [];
        let isLiked = false;

        // On window startup, fetch structural layouts and parse creator components dynamically
        window.onload = function() {
            loadUserUploadedReels();
            renderFavoritesGrid();
        };

        function loadUserUploadedReels() {
            const userReels = JSON.parse(localStorage.getItem('user_reels')) || [];
            userReels.forEach(reel => {
                // 1. Build Story Entry Circle
                const widget = document.createElement('div');
                widget.className = 'story-widget';
                // Escape simple strings to safeguard direct parameter string layout inside functional callbacks
                widget.onclick = () => openReel(reel.id, reel.videoSrc, reel.username, reel.avatarSrc, reel.description, reel.initialLikes, reel.coverImg);
                widget.innerHTML = `
                    <div class="thumbnail-ring" style="background:linear-gradient(45deg, var(--neon-cyan), #9b51e0)">
                        <img src="${reel.coverImg}" class="thumbnail-img">
                    </div>
                    <span class="story-name">${reel.username}</span>
                `;
                storiesRow.insertBefore(widget, storiesRow.firstChild);
            });
        }

        function openReel(id, videoSrc, username, avatarSrc, description, initialLikes, coverImg) {
            currentReelData = { id, videoSrc, username, avatarSrc, description, initialLikes, coverImg };
            
            video.src = videoSrc;
            document.getElementById('modalUser').innerText = username;
            document.getElementById('modalAvatar').src = avatarSrc;
            document.getElementById('modalDesc').innerText = description;
            likeCountText.innerText = initialLikes;
            
            isLiked = false;
            likeBtn.classList.remove('liked');
            favBtn.classList.toggle('favorited', favoriteReels.some(item => item.id === id));

            modal.classList.add('active');
            video.play().catch(e => console.log("Blob playback initialized."));
        }

        function closeReel() { video.pause(); modal.classList.remove('active'); toggleComments(false); }
        function toggleLike() { isLiked = !isLiked; likeBtn.classList.toggle('liked', isLiked); }

        function toggleFavorite() {
            const index = favoriteReels.findIndex(item => item.id === currentReelData.id);
            if (index > -1) {
                favoriteReels.splice(index, 1);
                favBtn.classList.remove('favorited');
            } else {
                favoriteReels.push(currentReelData);
                favBtn.classList.add('favorited');
            }
            renderFavoritesGrid();
        }

        function renderFavoritesGrid() {
            const emptyMsg = document.getElementById('emptyFavorites');
            document.querySelectorAll('.favorite-card-node').forEach(n => n.remove());

            if(favoriteReels.length === 0) { emptyMsg.style.display = 'block'; return; }
            emptyMsg.style.display = 'none';

            favoriteReels.forEach(reel => {
                const card = document.createElement('div');
                card.className = 'preview-card favorite-card-node';
                card.onclick = () => openReel(reel.id, reel.videoSrc, reel.username, reel.avatarSrc, reel.description, reel.initialLikes, reel.coverImg);
                card.innerHTML = `
                    <img src="${reel.coverImg}" class="preview-thumb">
                    <p class="preview-title">★ @${reel.username}</p>
                `;
                favoritesGrid.appendChild(card);
            });
        }

        function toggleComments(show) { document.getElementById('commentsDrawer').classList.toggle('open', show); }
        
        function postComment() {
            const input = document.getElementById('commentInput');
            const list = document.getElementById('commentsList');
            if(!input.value.trim()) return;

            const item = document.createElement('div');
            item.className = 'comment-item';
            item.innerHTML = `<span class="comment-user">you</span>${input.value.replace(/[&<>'"]/g, '')}`;
            list.appendChild(item);
            list.scrollTop = list.scrollHeight;
            input.value = '';
        }

        function triggerNativeShare() {
            if (navigator.share) {
                navigator.share({ title: `StoryTV Hub`, text: currentReelData.description, url: window.location.href }).catch(() => {});
            } else {
                alert(`Link copied! Dynamic media reference shared.`);
            }
        }
    </script>
</body>
</html>
